<!DOCTYPE html>
<html>

<head>

<title>Blockchain Explorer</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
padding:20px;
}

.block{
background:#222;
padding:15px;
margin:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Blockchain Explorer</h1>

<button onclick="loadBlocks()">Load Blockchain</button>

<div id="blocks"></div>

<script>

async function loadBlocks(){

const res = await fetch('/blocks');
const data = await res.json();

const container = document.getElementById("blocks");
container.innerHTML="";

data.chain.forEach(block => {

const div=document.createElement("div");
div.className="block";

div.innerHTML=`

<b>Block Index:</b> ${block.index}<br>
<b>Timestamp:</b> ${block.timestamp}<br>
<b>Data Hash:</b> ${block.dataHash}<br>
<b>Previous Hash:</b> ${block.previousHash}<br>
<b>Hash:</b> ${block.hash}

`;

container.appendChild(div);

});

}

</script>

</body>

</html>
